<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script type="text/javascript">
    function Animal(name) {
        this.name = name;
    }

    Animal.prototype.showName = function () {
        console.log(this.name);
    }

    function Cat() {
        //调用父类的构造函数,改变this指向,将父类中的方法和属性在子类上实施一遍，子类也会具备这些方法和属性
        Animal.call(this, 'CAT');
    }

    //将原型链接上，在接上之前，Cat的Cat.prototype.__proto__指向的是Object.prototype
    Cat.prototype.__proto__ = Animal.prototype;

    const myCat = new Cat();
    myCat.showName();
</script>
</body>
</html>
