<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>构造函数</title>
</head>
<body>
<script type="text/javascript">

    //函数作为构造函数使用时，属性赋值给了this，没有返回值。在内存中构造一个新的对象，
    //this指向这个对象。如果这个函数有返回非空的对象，则
    //返回这个对象，否则返回新创建的对象
    function Person(name, age, job) {
        this.name = name;
        this.age = age;
        this.job = job;
        this.sayName = function () {
            console.log(this.name);
        }
    }

    //函数表达式的方式来创建构造函数
    let Animal = function (name, age, job) {
        this.name = name;
        this.age = age;
        this.job = job;
        this.sayName = function () {
            console.log(this.name);
        }
    }

    let person1 = new Person("xiaowei", 18, "Software Engineer");
    let person2 = new Person("wumanqi", 9, "Student");

    person1.sayName();
    person2.sayName();

    //constructor 指向构造函数,可以用来表示对象类型,但是判断对象类型通常用instanceof判断
    console.log(person1.constructor == Person);
    console.log(person2.constructor == Person);

    console.log(person1 instanceof Person);
    console.log(person2 instanceof Person);


    //构造函数就和普通函数的区别就是调用方式区别
    //定义的方法会在每个实例上都创建一遍,可以通过将函数定义在外部来解决这个问题,但会把作用于搞的很乱
    console.log("构造函数中的函数比较:",person1.sayName === person2.sayName);//false

    //可以通过原型链来解决这个问题
</script>
</body>
</html>
