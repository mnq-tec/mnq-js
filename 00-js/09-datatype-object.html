<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>对象类型 引用类型和值类型对比</title>
</head>
<body>
<script type="text/javascript">
    //动态属性 注意在 js 中String 类型是值类型
    let obj = new Object();
    obj.name = "xiaowu";
    console.log(obj.name);

    let str = "xiaoqizi";
    str.name = "xiaoqizi";
    console.log(str.name);//值类型没有动态属性，undefined

    //js 采用值传递方式,这意味着如果是基础类型，仅仅是传递了值，如果是引用类型，传递了指向对象的指针的值

    //值对象可以通过typeof来判断类型，引用对象通过typeof判断的时候，会得到类型object 或者null，
    let s = "Alice";
    let b = true;
    let i = 22;
    let u;
    let n = null;
    let o = new Object();

    console.log(typeof s); // string
    console.log(typeof i); // number
    console.log(typeof b); // boolean
    console.log(typeof u); // undefined
    console.log(typeof n); // object
    console.log(typeof o); // object

    function Person(name, age, job) {
        this.name = name;
        this.age = age;
        this.job = job;
        this.sayName = function () {
            console.log(this.name);
        }
    }

    let person = new Person("xiaoming", 12, "engineer");
    console.log(person instanceof Person);//true




</script>
</body>
</html>
