    let person = {
        name: "Wu xiaowei",
        age: 3,
        job: {
            title: "Software Engineer"
        }
    };

    // 变量直接使用属性的名称

    console.log(name);
    console.log(age);

    //声明和解构分开时，结构必须放到一对括号内
    let a, b;

    ({name: a, age: b} = person);
    console.log(a);
    console.log(b);

    //嵌套解构
    let personCopy = {};
    /!*({name: personCopy.name, age: personCopy.age, job: personCopy.job} = person);

    let {name: personName, age: personAge, job: {title: jobTitle}} = person;

    console.log(jobTitle);*/

    }

    print("1st",person,"2nd");

    // 剩余操作符

</script>
